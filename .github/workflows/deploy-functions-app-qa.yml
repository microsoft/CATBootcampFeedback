name: Deploy Functions App (QA)
# QA ENVIRONMENT - Manual deployment via workflow dispatch

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy API to QA Function App
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd api
          npm install --production

      - name: Deploy to Azure Functions (QA)
        uses: Azure/functions-action@v1
        with:
          app-name: 'catbootcamp-api-qa'
          package: './api'
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE_QA }}
          scm-do-build-during-deployment: true
          enable-oryx-build: true

name: Deploy Functions App (QA)
# QA ENVIRONMENT - Manual deployment via workflow dispatch
# Uses Azure Functions Core Tools for reliable deploys to Linux Consumption plan

on:
  push:
    branches:
      - main
    paths:
      - 'api/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy API to QA Function App
    environment:
      name: QA
      url: https://catbootcamp-api-qa.azurewebsites.net/api/health
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Azure Functions Core Tools
        run: npm install -g azure-functions-core-tools@4 --unsafe-perm true

      - name: Install dependencies
        run: |
          cd api
          npm install --production

      - name: Azure Login
        uses: Azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_QA }}

      - name: Deploy to Azure Functions (QA)
        run: |
          cd api
          func azure functionapp publish catbootcamp-api-qa --javascript

name: Secret Scan
# Fails the build if any secret is committed to the repo.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks OSS binary
        run: |
          GITLEAKS_VERSION=8.28.0
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
      - name: Run gitleaks
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BEFORE_SHA: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            LOG_OPTS="${PR_BASE_SHA}..${GITHUB_SHA}"
          elif [ -n "$BEFORE_SHA" ] && [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
            LOG_OPTS="${BEFORE_SHA}..${GITHUB_SHA}"
          else
            LOG_OPTS="${GITHUB_SHA}"
          fi

          gitleaks git --redact --verbose --exit-code 1 --log-opts="$LOG_OPTS"

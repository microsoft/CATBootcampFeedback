name: Deploy Production (bootcamp-feedback)
# PRODUCTION ENVIRONMENT (rg-bootcamp-feedback) - auto-deploys on push to main,
# mirroring the QA trigger. Deploys frontend + API (Static Web Apps managed functions)
# in a single action.

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Deploy frontend + API to Production SWA
    environment:
      name: production-bootcamp-feedback
      url: https://white-ground-0d6d8650f.7.azurestaticapps.net
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false
      - name: Build And Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_NEWPROD }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/"
          api_location: "api"
          output_location: ""

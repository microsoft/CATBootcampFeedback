<!DOCTYPE html>
<html>
<head>
    <title>Test Count Page API</title>
</head>
<body>
    <h1>Testing Count Page API</h1>
    <div id="output"></div>
    <script>
        const output = document.getElementById('output');

        async function testAPI() {
            output.innerHTML += '<p>Starting test...</p>';
            output.innerHTML += `<p>Hostname: ${window.location.hostname}</p>`;

            const USE_MOCK_DATA = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
            output.innerHTML += `<p>USE_MOCK_DATA: ${USE_MOCK_DATA}</p>`;

            try {
                output.innerHTML += '<p>Fetching from /api/events/CSA1B2C3...</p>';
                const response = await fetch('/api/events/CSA1B2C3');
                output.innerHTML += `<p>Response status: ${response.status}</p>`;

                const data = await response.json();
                output.innerHTML += `<p>Data received: <pre>${JSON.stringify(data, null, 2)}</pre></p>`;

                if (data.data) {
                    output.innerHTML += `<p>ModuleName: ${data.data.ModuleName}</p>`;
                }
            } catch (error) {
                output.innerHTML += `<p style="color: red;">Error: ${error.message}</p>`;
                output.innerHTML += `<p style="color: red;">Stack: ${error.stack}</p>`;
            }
        }

        testAPI();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Login API</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #5568d3;
        }
        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 4px;
            background: #f5f5f5;
            white-space: pre-wrap;
            font-family: monospace;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <h1>Login API Test</h1>
    <p>Testing <code>POST /api/login</code> endpoint</p>

    <button onclick="testLogin()">Test Login (admin/CATBootcamp2026!)</button>
    <button onclick="testLoginWrong()">Test Wrong Password</button>
    <button onclick="testLoginCurl()">Test with Fetch (same as curl)</button>

    <div id="result"></div>

    <script>
        async function testLogin() {
            const result = document.getElementById('result');
            result.textContent = 'Testing...';
            result.className = '';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: 'admin',
                        password: 'CATBootcamp2026!'
                    })
                });

                const data = await response.json();
                result.textContent = `Status: ${response.status}\n\n${JSON.stringify(data, null, 2)}`;
                result.className = data.success ? 'success' : 'error';
            } catch (error) {
                result.textContent = `Error: ${error.message}`;
                result.className = 'error';
            }
        }

        async function testLoginWrong() {
            const result = document.getElementById('result');
            result.textContent = 'Testing...';
            result.className = '';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: 'admin',
                        password: 'wrongpassword'
                    })
                });

                const data = await response.json();
                result.textContent = `Status: ${response.status}\n\n${JSON.stringify(data, null, 2)}`;
                result.className = 'error';
            } catch (error) {
                result.textContent = `Error: ${error.message}`;
                result.className = 'error';
            }
        }

        async function testLoginCurl() {
            const result = document.getElementById('result');
            result.textContent = 'Testing...';
            result.className = '';

            try {
                const response = await fetch('https://blue-sea-0b9be530f.1.azurestaticapps.net/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: 'admin',
                        password: 'CATBootcamp2026!'
                    })
                });

                const data = await response.json();
                result.textContent = `Status: ${response.status}\n\n${JSON.stringify(data, null, 2)}`;
                result.className = data.success ? 'success' : 'error';
            } catch (error) {
                result.textContent = `Error: ${error.message}`;
                result.className = 'error';
            }
        }
    </script>
</body>
</html>

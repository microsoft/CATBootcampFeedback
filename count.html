<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Count Display</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f1a;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        .count-container {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 20px 30px;
            position: relative;
        }

        /* Confetti canvas overlay */
        #confettiCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
        }

        /* Header section */
        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            margin-bottom: 15px;
            flex-shrink: 0;
        }

        .event-info {
            flex: 1;
        }

        .event-code {
            font-size: 1.5rem;
            color: white;
            font-weight: 600;
        }

        .event-subtext {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .fullscreen-btn {
            background: rgba(255, 255, 255, 0.12);
            border: 2px solid rgba(255, 255, 255, 0.25);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        /* Main content area - two equal panels */
        .main-content {
            display: flex;
            gap: 25px;
            flex: 1;
            overflow: hidden;
        }

        /* Left section: Counter with progress ring */
        .left-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 20px;
            position: relative;
        }

        .count-label {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        /* Progress ring */
        .progress-ring-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .progress-ring {
            transform: rotate(-90deg);
        }

        .progress-ring-bg {
            fill: none;
            stroke: rgba(255, 255, 255, 0.08);
        }

        .progress-ring-fill {
            fill: none;
            stroke: url(#progressGradient);
            stroke-linecap: round;
            transition: stroke-dashoffset 1s ease-out;
            filter: drop-shadow(0 0 10px rgba(102, 126, 234, 0.5));
        }

        /* Counter number centered inside ring */
        .counter-wrapper {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .counter-number {
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: white;
            text-shadow: 0 0 40px rgba(102, 126, 234, 0.5);
        }

        /* Slot-machine digit reels */
        .counter-digit {
            display: inline-block;
            height: 1em;
            overflow: hidden;
            line-height: 1;
        }

        .digit-column {
            display: flex;
            flex-direction: column;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .digit-column span {
            display: block;
            height: 1em;
            line-height: 1;
            text-align: center;
        }

        /* Pulse animation on count change */
        @keyframes counterPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }

        .counter-number.pulse {
            animation: counterPulse 0.5s ease-out;
        }

        /* Milestone message */
        .milestone-message {
            margin-top: 15px;
            font-size: 1.4rem;
            color: #ffd700;
            font-weight: 700;
            text-align: center;
            min-height: 1.8em;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: scale(0.8) translateY(10px);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .milestone-message.visible {
            opacity: 1;
            transform: scale(1) translateY(0);
            animation: milestoneGlow 1.5s ease-in-out infinite;
        }

        @keyframes milestoneGlow {
            0%, 100% { text-shadow: 0 0 15px rgba(255, 215, 0, 0.5); }
            50% { text-shadow: 0 0 30px rgba(255, 215, 0, 0.8), 0 0 60px rgba(255, 215, 0, 0.3); }
        }

        /* Encouraging message */
        .encouraging-message {
            margin-top: 8px;
            font-size: 1.6rem;
            color: rgba(255, 255, 255, 0.8);
            text-align: center;
            min-height: 1.8em;
            transition: opacity 0.5s ease;
            font-weight: 600;
            text-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
        }

        /* Right section: QR Code */
        .right-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 30px;
        }

        .qr-section {
            text-align: center;
        }

        .qr-label {
            font-size: 1.5rem;
            color: white;
            margin-bottom: 25px;
            font-weight: 700;
        }

        #qrCode {
            display: inline-block;
            padding: 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .qr-instructions {
            margin-top: 25px;
            font-size: 1.05rem;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.6;
        }

        /* Footer section */
        .footer-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            flex-shrink: 0;
        }

        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            background: rgba(40, 167, 69, 0.15);
            color: #4cdf7f;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #4cdf7f;
            border-radius: 50%;
            animation: blink 2s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .refresh-controls {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .refresh-controls label {
            font-weight: 500;
        }

        .refresh-controls select {
            padding: 5px 10px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.08);
            color: white;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .refresh-controls select option {
            background: #1a1a2e;
            color: white;
        }

        .last-updated {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.35);
        }

        /* Loading and error states */
        .spinner {
            width: 50px;
            height: 50px;
            margin: 20px auto;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading {
            font-size: 1.5rem;
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
            padding: 40px;
        }

        .error-message {
            color: #ff6b6b;
            font-size: 1.1rem;
            padding: 20px;
            text-align: center;
        }

        /* Fullscreen mode adjustments */
        .count-container:fullscreen {
            padding: 30px 40px;
        }

        .count-container:-webkit-full-screen {
            padding: 30px 40px;
        }

        .count-container:-moz-full-screen {
            padding: 30px 40px;
        }

        /* Event selection view */
        #eventSelectionView {
            text-align: left;
            max-width: 600px;
            margin: 0 auto;
        }

        #eventSelectionView h2 {
            margin-bottom: 20px;
            color: white;
        }

        #eventSelectionView p {
            margin-bottom: 20px;
            color: rgba(255, 255, 255, 0.7);
        }

        #eventSelectionView select {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.08);
            color: white;
            margin-bottom: 20px;
        }

        #eventSelectionView select option {
            background: #1a1a2e;
            color: white;
        }

        #eventSelectionView button {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        #eventSelectionView button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #viewModeSelection {
            margin-bottom: 20px;
        }

        #viewModeSelection label {
            display: block;
            margin-bottom: 10px;
            color: rgba(255, 255, 255, 0.7);
        }
    </style>
</head>
<body>
    <canvas id="confettiCanvas"></canvas>

    <div class="count-container">
        <div id="loadingState">
            <div class="spinner"></div>
            <p class="loading">Loading feedback count...</p>
        </div>

        <div id="eventSelectionView" style="display: none;">
            <h2>Select Event</h2>
            <p>Choose the event to display feedback counts for:</p>
            <select id="eventSelect">
                <option value="">-- Loading events... --</option>
            </select>
            <div id="viewModeSelection" style="display: none;">
                <p style="margin-bottom: 10px; color: rgba(255,255,255,0.7);">View mode:</p>
                <label>
                    <input type="radio" name="viewMode" value="event" checked> Event-level (all modules)
                </label>
                <label>
                    <input type="radio" name="viewMode" value="module"> Module-specific
                </label>
                <select id="moduleSelect" style="display: none; margin-top: 10px;">
                    <option value="">-- Select a module --</option>
                </select>
            </div>
            <button id="continueBtn" disabled>
                Continue
            </button>
        </div>

        <div id="countDisplay" style="display: none; height: 100%; flex-direction: column;">
            <!-- Header -->
            <div class="header-section">
                <div class="event-info">
                    <div class="event-code" id="eventCodeDisplay">Event Code</div>
                </div>
                <button class="fullscreen-btn" id="fullscreenBtn">Fullscreen</button>
            </div>

            <!-- Main content area -->
            <div class="main-content">
                <!-- Left section: Counter -->
                <div class="left-section">
                    <div class="count-label">Total Feedback</div>
                    <div class="progress-ring-container">
                        <svg class="progress-ring" id="progressRing">
                            <defs>
                                <linearGradient id="progressGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" style="stop-color:#667eea" />
                                    <stop offset="50%" style="stop-color:#764ba2" />
                                    <stop offset="100%" style="stop-color:#f093fb" />
                                </linearGradient>
                            </defs>
                            <circle class="progress-ring-bg" id="ringBg" />
                            <circle class="progress-ring-fill" id="ringFill" />
                        </svg>
                        <div class="counter-wrapper">
                            <div class="counter-number" id="counterNumber"></div>
                        </div>
                    </div>
                    <div class="milestone-message" id="milestoneMessage"></div>
                    <div class="encouraging-message" id="encouragingMessage"></div>
                </div>

                <!-- Right section: QR Code -->
                <div class="right-section">
                    <div class="qr-section">
                        <div class="qr-label">Scan to Give Feedback</div>
                        <canvas id="qrCode"></canvas>
                        <div class="qr-instructions">
                            Point your phone camera at the QR code to submit feedback
                        </div>
                    </div>
                </div>
            </div>

            <!-- Footer -->
            <div class="footer-section">
                <div style="display: flex; gap: 15px; align-items: center;">
                    <div class="status-indicator">
                        <div class="status-dot"></div>
                        <span>Live</span>
                    </div>
                    <div class="refresh-controls">
                        <label for="refreshInterval">Refresh:</label>
                        <select id="refreshInterval">
                            <option value="5000" selected>5s</option>
                            <option value="10000">10s</option>
                            <option value="15000">15s</option>
                            <option value="30000">30s</option>
                        </select>
                    </div>
                    <div class="refresh-controls">
                        <label for="celebrationLevel">Celebrations:</label>
                        <select id="celebrationLevel">
                            <option value="1" selected>Chill</option>
                            <option value="2">Party</option>
                            <option value="3">Chaos</option>
                        </select>
                    </div>
                    <div class="refresh-controls">
                        <label for="soundToggle">Sound:</label>
                        <select id="soundToggle">
                            <option value="on" selected>On</option>
                            <option value="off">Off</option>
                        </select>
                    </div>
                </div>
                <div class="last-updated">Last updated: <span id="lastUpdated">-</span></div>
            </div>
        </div>

        <div id="errorState" style="display: none;">
            <div class="error-message" id="errorMessage">Unable to load feedback count.</div>
        </div>
    </div>

    <script src="qrcode.min.js"></script>
    <script type="module" src="count.js"></script>
</body>
</html>
